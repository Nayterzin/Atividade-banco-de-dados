{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Profissional — Beleza de Salão</title>
  <link rel="stylesheet" href="{% static 'style.css' %}" />
</head>
<body class="auth-page">

  <a href="{% url 'login' %}" class="btn-switch-role">Entrar como Cliente</a>

  <div class="auth-card">
    <div class="logo-space">
      <img src="{% static 'logorosa.png' %}" alt="Beleza de Salão" />
    </div>

    <h1 class="auth-title">Área do Profissional</h1>
    <p class="auth-subtitle">Insira sua matrícula/CPF e senha de acesso para gerenciar sua agenda.</p>

    {% if messages %}
      <ul class="messages-list" aria-live=\"polite\">
        {% for message in messages %}
          <li class="message-item {{ message.tags }}">{{ message }}</li>
        {% endfor %}
      </ul>
    {% endif %}

    <form method="POST" action="{% url 'login_profissional' %}" novalidate>
      {% csrf_token %}

      <div class="form-group">
        <label for="matricula">Matrícula ou CPF</label>
        <input
          type="text"
          id="matricula"
          name="cpf"
          placeholder="Ex: 000.000.000-00"
          required
          autofocus
        />
      </div>

      <div class="form-group">
        <label for="senha">Senha</label>
        <input
          type="password"
          id="senha"
          name="senha"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        />
      </div>

      <button type="submit" class="btn btn-primary btn-profissional-submit">
        Entrar como Profissional
      </button>
    </form>
  </div>

<script src="{% static 'script.js' %}"></script>
</body>
</html>
