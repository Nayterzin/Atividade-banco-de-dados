{% load static %}
<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Criar Conta — Beleza de Salão</title>
    <link rel="stylesheet" href="{% static 'style.css' %}" />
  </head>
  <body class="auth-page">
    <div class="auth-card">
      <div class="logo-space">
        <img src="{% static 'logorosa.png' %}" alt="Beleza de Salão" />
      </div>
      <h1 class="auth-title">Criar conta</h1>
      <p class="auth-subtitle">
        Preencha os dados abaixo para agendar seus serviços.
      </p>
      {% if messages %}
      <ul class="messages-list" aria-live="polite">
        {% for message in messages %}
        <li class="message-item {{ message.tags }}">{{ message }}</li>
        {% endfor %}
      </ul>
      {% endif %}
      <form method="POST" action="{% url 'cadastro_c' %}" novalidate>
        {% csrf_token %}
        <div class="form-group">
          <label for="nome">Nome completo</label>
          <input
            type="text"
            id="nome"
            name="nome"
            placeholder="Seu nome completo"
            autocomplete="name"
            required
            autofocus
          />
        </div>
        <div class="form-group">
          <label for="cpf">CPF</label>
          <input
            type="text"
            id="cpf"
            name="cpf"
            placeholder="000.000.000-00"
            required
          />
        </div>
        <div class="form-group">
          <label for="email">E-mail</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="seu@email.com"
            autocomplete="email"
            required
          />
        </div>
        <div class="form-group">
          <label for="telefone">Telefone</label>
          <input
            type="text"
            id="telefone"
            name="telefone"
            placeholder="(00) 00000-0000"
            autocomplete="tel"
          />
        </div>
        <div class="form-group">
          <label for="senha">Senha</label>
          <input
            type="password"
            id="senha"
            name="senha"
            placeholder="Mínimo 8 caracteres"
            autocomplete="new-password"
            required
          />
        </div>
        <div class="form-group">
          <label for="confirmar_senha">Confirmar senha</label>
          <input
            type="password"
            id="confirmar_senha"
            name="confirmar_senha"
            placeholder="Repita a senha"
            autocomplete="new-password"
            required
          />
        </div>
        <button type="submit" class="btn btn-primary">Criar minha conta</button>
      </form>
      <nav class="auth-links" aria-label="Links auxiliares">
        Já tem conta? <a href="{% url 'login' %}">Fazer login</a>
      </nav>
    </div>
    <script src="{% static 'script.js' %}"></script>
  </body>
</html>
